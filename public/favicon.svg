<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <!-- Background gradient - more vibrant -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f0c29"/>
      <stop offset="50%" stop-color="#302b63"/>
      <stop offset="100%" stop-color="#24243e"/>
    </linearGradient>
    
    <!-- Neon border glow filter -->
    <filter id="neonGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="1 0 0 0 0  0 0.5 0 0 0  0 0.3 0 0 0  0 0 0 0.8 0" result="colored"/>
      <feMerge>
        <feMergeNode in="colored"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Receipt paper gradient - thermal paper look -->
    <linearGradient id="receiptGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fffaf0"/>
      <stop offset="100%" stop-color="#f5e6c8"/>
    </linearGradient>

    <!-- Bolt gradient -->
    <linearGradient id="boltGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffdd66"/>
      <stop offset="100%" stop-color="#ff8800"/>
    </linearGradient>

    <!-- Drop shadow for receipt -->
    <filter id="shadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#000" flood-opacity="0.5"/>
    </filter>

    <!-- Heat wave filter -->
    <filter id="heatWave" x="-20%" y="-20%" width="140%" height="140%">
      <feTurbulence type="turbulence" baseFrequency="0.02" numOctaves="2" result="turbulence"/>
      <feDisplacementMap in="SourceGraphic" in2="turbulence" scale="2" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
  </defs>

  <!-- Rounded dark background with subtle border -->
  <rect width="64" height="64" rx="16" fill="url(#bgGrad)" stroke="#ffaa44" stroke-width="0.8" filter="url(#neonGlow)"/>

  <!-- Receipt paper (with shadow) -->
  <g filter="url(#shadow)">
    <!-- Main receipt shape with tear-off bottom -->
    <path d="M16 10 h32 v36 l-4 -3 -4 3 -4 -3 -4 3 -4 -3 -4 3 -4 -3 z" 
          fill="url(#receiptGrad)" stroke="#bb9966" stroke-width="1"/>
    
    <!-- Perforation dashed line at top -->
    <line x1="16" y1="15" x2="48" y2="15" stroke="#ccaa77" stroke-dasharray="2 2" stroke-width="1" opacity="0.8"/>
    
    <!-- Store name placeholder (hand-drawn text style) -->
    <text x="32" y="22" font-family="monospace" font-size="5" font-weight="bold" fill="#444" text-anchor="middle">THERMAL</text>
    
    <!-- Receipt item lines -->
    <rect x="20" y="27" width="24" height="2" rx="1" fill="#666" opacity="0.6"/>
    <rect x="20" y="31" width="20" height="1.5" rx="0.8" fill="#888" opacity="0.5"/>
    <rect x="20" y="34" width="22" height="1.5" rx="0.8" fill="#888" opacity="0.5"/>
    <rect x="20" y="37" width="16" height="1.5" rx="0.8" fill="#999" opacity="0.4"/>
    
    <!-- Total amount (bold) -->
    <rect x="20" y="42" width="24" height="2.5" rx="1" fill="#333" opacity="0.8"/>
    
    <!-- Barcode at bottom -->
    <g transform="translate(22, 47)">
      <rect x="0" y="0" width="1.5" height="5" fill="#333"/>
      <rect x="2.5" y="0" width="1" height="5" fill="#333"/>
      <rect x="4.5" y="0" width="2" height="5" fill="#333"/>
      <rect x="7.5" y="0" width="0.8" height="5" fill="#333"/>
      <rect x="9.2" y="0" width="1.5" height="5" fill="#333"/>
      <rect x="11.8" y="0" width="1" height="5" fill="#333"/>
      <rect x="13.8" y="0" width="2" height="5" fill="#333"/>
      <rect x="16.8" y="0" width="0.8" height="5" fill="#333"/>
      <rect x="18.5" y="0" width="1.2" height="5" fill="#333"/>
    </g>
  </g>

  <!-- Lightning bolt with enhanced glow and gradient -->
  <g filter="url(#glow)">
    <path d="M34 44 l-6 8 h4.5 l-1.2 5 7 -8 h-4.5 z" fill="url(#boltGrad)" stroke="#ff6600" stroke-width="0.8"/>
    <!-- Mini spark at bolt tip -->
    <circle cx="29" cy="52" r="1.2" fill="#ffdd88"/>
  </g>

  <!-- Heat wave / thermal lines near the bolt -->
  <g transform="translate(38, 48)" opacity="0.7">
    <path d="M0 0 Q3 -2 5 0" fill="none" stroke="#ffaa55" stroke-width="0.8" stroke-linecap="round"/>
    <path d="M0 2 Q3 0 5 2" fill="none" stroke="#ffaa55" stroke-width="0.8" stroke-linecap="round"/>
    <path d="M0 4 Q3 2 5 4" fill="none" stroke="#ffaa55" stroke-width="0.8" stroke-linecap="round"/>
  </g>

  <!-- Tiny sparkle dots around -->
  <circle cx="27" cy="41" r="0.9" fill="#ffcc66" opacity="0.9"/>
  <circle cx="42" cy="42" r="0.7" fill="#ffcc66" opacity="0.7"/>
  <circle cx="33" cy="55" r="0.6" fill="#ffaa55" opacity="0.8"/>
  
  <!-- Rubber stamp effect "RECEIPT" -->
  <g transform="translate(46, 58) rotate(-15)">
    <rect x="-12" y="-4" width="24" height="8" rx="1" fill="none" stroke="#cc6644" stroke-width="0.8" opacity="0.5"/>
    <text x="0" y="1" font-family="monospace" font-size="4" font-weight="bold" fill="#cc6644" text-anchor="middle" opacity="0.7">RECEIPT</text>
  </g>
</svg>
